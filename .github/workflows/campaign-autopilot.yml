name: Campaign autopilot and Pages deploy

on:
  push:
    branches: [main]
    paths:
      - "content/campaign.json"
      - "content/autopilot.json"
      - "scripts/publish-next.mjs"
      - ".github/workflows/campaign-autopilot.yml"
  schedule:
    - cron: "17 7 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Configure canonical GitHub URLs
        run: node scripts/configure-repository.mjs "$GITHUB_REPOSITORY_Mycelorium"
      - name: Validate canonical corpus and campaign
        run: node scripts/validate.mjs
      - name: Publish next authorised dispatch
        run: node scripts/publish-next.mjs
      - name: Create repository labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create evidence-review --color 1D76DB --description "Scheduled evidence and counterevidence review" --force
          gh label create claim-challenge --color B60205 --description "Challenge, narrow, or falsify a registered claim" --force
          gh label create research-proposal --color 0E8A16 --description "Propose a reproducible test" --force
          gh label create research-inbox --color D4C5F9 --description "Unreviewed automated literature candidates" --force
      - name: Commit publication state and generated site
        run: |
          git config user.name "Nirodha Collective Autopilot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No publication changes to commit."
          else
            git commit -m "publish: next Predator Principle dispatch"
            git push
          fi
      - name: Optional one-webhook syndication
        continue-on-error: true
        env:
          SYNDICATION_WEBHOOK_URL: ${{ secrets.SYNDICATION_WEBHOOK_URL }}
          SYNDICATION_WEBHOOK_TOKEN: ${{ secrets.SYNDICATION_WEBHOOK_TOKEN }}
        run: |
          if [ -n "$SYNDICATION_WEBHOOK_URL" ] && [ -f dist/published-this-run.json ]; then
            node scripts/syndicate-webhook.mjs
          else
            echo "No external syndication webhook configured; website and feeds remain active."
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
