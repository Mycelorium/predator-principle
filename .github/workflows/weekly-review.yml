name: Weekly evidence review

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  open-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `Evidence review — ${date}`;
            const body = [
              '## Weekly review',
              '',
              '- [ ] Check new primary research and credible counterevidence.',
              '- [ ] Select one claim for boundary/falsifier review.',
              '- [ ] Record corrections as a pull request.',
              '- [ ] Prepare drafts with `approved: false`.',
              '- [ ] Name the human reviewer before approval.',
              '',
              'Do not use this issue to auto-publish external content.'
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'evidence-review'
            });
            if (!existing.data.some(issue => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['evidence-review']
              });
            }
